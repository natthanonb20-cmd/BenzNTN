<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หอดี — จัดการระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-blue-800 text-white px-6 py-3 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
        <span class="font-black text-sm">ห</span>
      </div>
      <span class="font-bold text-lg">หอ<span class="text-amber-300">ดี</span> <span class="text-blue-300 text-sm font-normal">— Master Admin</span></span>
    </div>
    <div class="flex items-center gap-4">
      <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white text-sm font-medium px-4 py-1.5 rounded-lg transition">🏠 จัดการหอพักของฉัน</a>
      <button onclick="logout()" class="text-blue-200 hover:text-white text-sm transition">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-8">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
        <p class="text-xs text-gray-500 mb-1">รออนุมัติ</p>
        <p id="stat-pending" class="text-3xl font-bold text-amber-500">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
        <p class="text-xs text-gray-500 mb-1">ใช้งานอยู่</p>
        <p id="stat-active" class="text-3xl font-bold text-green-600">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
        <p class="text-xs text-gray-500 mb-1">หอพักทั้งหมด</p>
        <p id="stat-total" class="text-3xl font-bold text-blue-700">—</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
        <p class="text-xs text-gray-500 mb-1">ห้องทั้งหมด</p>
        <p id="stat-rooms" class="text-3xl font-bold text-gray-700">—</p>
      </div>
    </div>

    <!-- Pending Approvals -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-8">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="font-bold text-gray-800 text-lg flex items-center gap-2">
          ⏳ รออนุมัติการใช้งาน
          <span id="pending-badge" class="hidden bg-amber-100 text-amber-700 text-xs font-bold px-2 py-0.5 rounded-full"></span>
        </h2>
        <button onclick="loadAll()" class="text-sm text-blue-600 hover:underline">รีเฟรช</button>
      </div>
      <div id="pending-list" class="divide-y divide-gray-50">
        <p class="text-center text-gray-400 py-10 text-sm">กำลังโหลด...</p>
      </div>
    </div>

    <!-- All Properties -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="font-bold text-gray-800 text-lg">🏠 หอพักทั้งหมด</h2>
        <input id="search-inp" type="text" placeholder="ค้นหาชื่อหอพัก..." oninput="filterProps()"
          class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 w-44" />
      </div>
      <div id="props-list" class="divide-y divide-gray-50">
        <p class="text-center text-gray-400 py-10 text-sm">กำลังโหลด...</p>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-5 py-2.5 rounded-full shadow-lg transition-all opacity-0 pointer-events-none z-50">
    ข้อความ
  </div>

  <script>
    const token = localStorage.getItem('hordeeToken');
    if (!token) window.location.replace('login.html');
    const H = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    // Check role
    (async () => {
      try {
        const me = await fetch('/api/auth/me', { headers: H }).then(r => r.json());
        if (me.role !== 'MASTER_ADMIN') {
          alert('หน้านี้สำหรับ Master Admin เท่านั้น');
          window.location.replace('index.html');
        }
      } catch { window.location.replace('login.html'); }
    })();

    let allProps = [];

    async function loadAll() {
      await Promise.all([loadPending(), loadProperties(), loadStats()]);
    }

    async function loadStats() {
      try {
        const s = await fetch('/api/admin/stats', { headers: H }).then(r => r.json());
        document.getElementById('stat-total').textContent  = s.totalProperties ?? '—';
        document.getElementById('stat-active').textContent = s.activeProperties ?? '—';
        document.getElementById('stat-rooms').textContent  = s.totalRooms ?? '—';
      } catch {}
    }

    async function loadPending() {
      const el = document.getElementById('pending-list');
      try {
        const list = await fetch('/api/admin/pending', { headers: H }).then(r => r.json());
        document.getElementById('stat-pending').textContent = list.length;
        const badge = document.getElementById('pending-badge');
        if (list.length > 0) { badge.textContent = list.length; badge.classList.remove('hidden'); }
        else { badge.classList.add('hidden'); }

        if (!list.length) {
          el.innerHTML = '<p class="text-center text-gray-400 py-10 text-sm">ไม่มีรายการรออนุมัติ ✓</p>';
          return;
        }
        el.innerHTML = list.map(p => `
          <div class="px-6 py-4 flex flex-col sm:flex-row sm:items-center gap-3" id="pending-${p.id}">
            <div class="flex-1">
              <p class="font-semibold text-gray-800">${esc(p.name)}</p>
              <p class="text-sm text-gray-500 mt-0.5">
                ${p.ownerName ? esc(p.ownerName) + ' · ' : ''}
                ${p.phone ? esc(p.phone) + ' · ' : ''}
                <span class="text-blue-600 font-mono text-xs">user: ${esc(p.users[0]?.username ?? '-')}</span>
              </p>
              <p class="text-xs text-gray-400 mt-0.5">${p.address ? esc(p.address) + ' · ' : ''}สมัครเมื่อ ${thDate(p.createdAt)}</p>
            </div>
            <div class="flex gap-2 shrink-0">
              <button onclick="approveProperty('${p.id}', this)"
                class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
                ✓ อนุมัติ
              </button>
              <button onclick="rejectProperty('${p.id}', '${esc(p.name)}')"
                class="bg-red-50 hover:bg-red-100 text-red-600 text-sm font-semibold px-4 py-2 rounded-lg border border-red-200 transition">
                ✕ ปฏิเสธ
              </button>
            </div>
          </div>
        `).join('');
      } catch {
        el.innerHTML = '<p class="text-center text-red-400 py-6 text-sm">โหลดข้อมูลไม่สำเร็จ</p>';
      }
    }

    async function loadProperties() {
      const el = document.getElementById('props-list');
      try {
        allProps = await fetch('/api/admin/properties', { headers: H }).then(r => r.json());
        renderProps(allProps);
      } catch {
        el.innerHTML = '<p class="text-center text-red-400 py-6 text-sm">โหลดข้อมูลไม่สำเร็จ</p>';
      }
    }

    function renderProps(list) {
      const el = document.getElementById('props-list');
      if (!list.length) {
        el.innerHTML = '<p class="text-center text-gray-400 py-10 text-sm">ไม่มีข้อมูล</p>'; return;
      }
      el.innerHTML = list.map(p => {
        const badge = p.isActive
          ? '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full font-medium">ใช้งาน</span>'
          : '<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full font-medium">ระงับ</span>';
        const plan  = p.subscription?.plan ?? '—';
        const rooms = p._count?.rooms ?? 0;
        const tenants = p._count?.tenants ?? 0;
        return `
          <div class="px-6 py-3 flex items-center gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <p class="font-semibold text-gray-800 truncate">${esc(p.name)}</p>
                ${badge}
                <span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">${plan}</span>
              </div>
              <p class="text-xs text-gray-400 mt-0.5">
                ${p.ownerName ? esc(p.ownerName) + ' · ' : ''}
                ${rooms} ห้อง · ${tenants} ผู้เช่า · สร้างเมื่อ ${thDate(p.createdAt)}
              </p>
            </div>
            <div class="flex gap-2 shrink-0">
              ${p.isActive
                ? `<button onclick="toggleActive('${p.id}', false)" class="text-xs text-red-500 hover:underline">ระงับ</button>`
                : `<button onclick="toggleActive('${p.id}', true)"  class="text-xs text-green-600 hover:underline">เปิดใช้</button>`}
            </div>
          </div>`;
      }).join('');
    }

    function filterProps() {
      const q = document.getElementById('search-inp').value.toLowerCase();
      renderProps(allProps.filter(p =>
        p.name.toLowerCase().includes(q) || (p.ownerName ?? '').toLowerCase().includes(q)
      ));
    }

    async function approveProperty(id, btn) {
      btn.textContent = 'กำลังอนุมัติ...'; btn.disabled = true;
      try {
        const res = await fetch(`/api/admin/properties/${id}/approve`, { method: 'POST', headers: H });
        if (res.ok) { showToast('✓ อนุมัติสำเร็จ'); await loadAll(); }
        else { showToast('เกิดข้อผิดพลาด'); btn.textContent = '✓ อนุมัติ'; btn.disabled = false; }
      } catch { showToast('เกิดข้อผิดพลาด'); btn.textContent = '✓ อนุมัติ'; btn.disabled = false; }
    }

    async function rejectProperty(id, name) {
      if (!confirm(`ปฏิเสธและลบบัญชี "${name}" ออกจากระบบ?\nการกระทำนี้ไม่สามารถย้อนกลับได้`)) return;
      try {
        const res = await fetch(`/api/admin/properties/${id}/reject`, { method: 'POST', headers: H });
        if (res.ok) { showToast('ลบบัญชีเรียบร้อยแล้ว'); await loadAll(); }
        else showToast('เกิดข้อผิดพลาด');
      } catch { showToast('เกิดข้อผิดพลาด'); }
    }

    async function toggleActive(id, active) {
      try {
        await fetch(`/api/admin/properties/${id}`, {
          method: 'PUT', headers: H,
          body: JSON.stringify({ isActive: active }),
        });
        showToast(active ? 'เปิดใช้งานแล้ว' : 'ระงับบัญชีแล้ว');
        await loadAll();
      } catch { showToast('เกิดข้อผิดพลาด'); }
    }

    function logout() {
      localStorage.removeItem('hordeeToken');
      window.location.replace('login.html');
    }

    function thDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('opacity-0'); t.classList.add('opacity-100');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.classList.remove('opacity-100'); t.classList.add('opacity-0'); }, 2500);
    }

    loadAll();
  </script>
</body>
</html>
