<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Admin — หอดี</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-amber-400 rounded-lg flex items-center justify-center">
          <span class="text-gray-900 font-black text-base leading-none">ห</span>
        </div>
        <span class="font-bold text-base">หอ<span class="text-amber-400">ดี</span> <span class="text-gray-400 text-xs font-normal ml-1">Master Admin</span></span>
      </div>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-400 transition">ออกจากระบบ</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-cards">
      <div class="bg-white rounded-xl p-5 shadow-sm text-center"><div class="text-3xl font-bold text-gray-800" id="stat-total">—</div><div class="text-gray-500 text-sm mt-1">หอพักทั้งหมด</div></div>
      <div class="bg-white rounded-xl p-5 shadow-sm text-center"><div class="text-3xl font-bold text-green-600" id="stat-active">—</div><div class="text-gray-500 text-sm mt-1">ใช้งานอยู่</div></div>
      <div class="bg-white rounded-xl p-5 shadow-sm text-center"><div class="text-3xl font-bold text-blue-600" id="stat-rooms">—</div><div class="text-gray-500 text-sm mt-1">ห้องทั้งหมด</div></div>
      <div class="bg-white rounded-xl p-5 shadow-sm text-center"><div class="text-3xl font-bold text-purple-600" id="stat-std">—</div><div class="text-gray-500 text-sm mt-1">แพ็ก Standard+</div></div>
    </div>

    <!-- Tab Bar -->
    <div class="flex gap-1 mb-6 bg-white rounded-xl shadow-sm p-1 w-fit">
      <button onclick="showTab('properties')" id="tab-properties"
        class="px-5 py-2 rounded-lg text-sm font-medium bg-blue-700 text-white transition">หอพัก</button>
      <button onclick="showTab('users')" id="tab-users"
        class="px-5 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">ผู้ใช้งาน</button>
    </div>

    <!-- Properties Tab -->
    <div id="tab-properties-content">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">รายการหอพัก</h2>
        <button onclick="openPropertyModal()" class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">+ เพิ่มหอพัก</button>
      </div>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr class="text-left text-gray-500 font-semibold">
              <th class="px-4 py-3">หอพัก</th>
              <th class="px-4 py-3">เจ้าของ</th>
              <th class="px-4 py-3">แพ็กเกจ</th>
              <th class="px-4 py-3">ห้อง</th>
              <th class="px-4 py-3">หมดอายุ</th>
              <th class="px-4 py-3">สถานะ</th>
              <th class="px-4 py-3">จัดการ</th>
            </tr>
          </thead>
          <tbody id="property-table" class="divide-y divide-gray-50">
            <tr><td colspan="7" class="px-4 py-6 text-center text-gray-400">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users-content" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">ผู้ใช้งานระบบ</h2>
        <button onclick="openUserModal()" class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">+ เพิ่มผู้ใช้</button>
      </div>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr class="text-left text-gray-500 font-semibold">
              <th class="px-4 py-3">Username</th>
              <th class="px-4 py-3">Role</th>
              <th class="px-4 py-3">หอพัก</th>
              <th class="px-4 py-3">สถานะ</th>
              <th class="px-4 py-3">จัดการ</th>
            </tr>
          </thead>
          <tbody id="user-table" class="divide-y divide-gray-50">
            <tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Modal: Property -->
  <div id="modal-property" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b flex items-center justify-between">
        <h3 id="modal-property-title" class="text-lg font-bold text-gray-800">เพิ่มหอพักใหม่</h3>
        <button onclick="closePropertyModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="mp-id" />

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">ชื่อหอพัก *</label>
            <input id="mp-name" type="text" placeholder="หอดีพลัส"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">ชื่อเจ้าของ</label>
            <input id="mp-owner" type="text" placeholder="คุณสมชาย"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">เบอร์โทร</label>
            <input id="mp-phone" type="tel" placeholder="0812345678"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">ที่อยู่</label>
            <input id="mp-address" type="text" placeholder="เลขที่ 123..."
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <hr class="border-gray-100" />
        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">แพ็กเกจ</div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Plan *</label>
            <select id="mp-plan" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="FREE_TRIAL">Free Trial (10 ห้อง)</option>
              <option value="STARTER">Starter S (20 ห้อง)</option>
              <option value="STANDARD">Standard M (50 ห้อง)</option>
              <option value="PROFESSIONAL">Professional L (100 ห้อง)</option>
              <option value="ENTERPRISE">Enterprise (ไม่จำกัด)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">วันหมดอายุ</label>
            <input id="mp-expires" type="date"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <div id="mp-new-user-section">
          <hr class="border-gray-100" />
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide">บัญชีเข้าใช้งาน</div>
          <div class="grid grid-cols-2 gap-3 mt-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Username *</label>
              <input id="mp-username" type="text" placeholder="dorm_owner"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Password *</label>
              <input id="mp-password" type="password" placeholder="รหัสผ่าน"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-500 mb-1">LINE Channel Access Token</label>
          <input id="mp-line-token" type="text" placeholder="..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">LINE Channel Secret</label>
          <input id="mp-line-secret" type="text" placeholder="..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
      </div>
      <div class="p-6 border-t flex gap-3 justify-end">
        <button onclick="closePropertyModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">ยกเลิก</button>
        <button onclick="saveProperty()" class="px-5 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg text-sm transition">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Modal: Subscription -->
  <div id="modal-sub" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
      <div class="p-5 border-b flex items-center justify-between">
        <h3 class="font-bold text-gray-800">จัดการแพ็กเกจ</h3>
        <button onclick="closeSubModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <div class="p-5 space-y-4">
        <input type="hidden" id="sub-prop-id" />
        <div>
          <label class="block text-xs text-gray-500 mb-1">Plan</label>
          <select id="sub-plan" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            <option value="FREE_TRIAL">Free Trial</option>
            <option value="STARTER">Starter S</option>
            <option value="STANDARD">Standard M</option>
            <option value="PROFESSIONAL">Professional L</option>
            <option value="ENTERPRISE">Enterprise</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">วันหมดอายุ (เว้นว่าง = ไม่มีกำหนด)</label>
          <input id="sub-expires" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <label class="flex items-center gap-2 text-sm">
          <input id="sub-active" type="checkbox" class="w-4 h-4 accent-blue-600" />
          ใช้งานได้ (Active)
        </label>
      </div>
      <div class="p-5 border-t flex gap-3 justify-end">
        <button onclick="closeSubModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600">ยกเลิก</button>
        <button onclick="saveSub()" class="px-5 py-2 bg-blue-700 text-white font-semibold rounded-lg text-sm">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Modal: User -->
  <div id="modal-user" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
      <div class="p-5 border-b flex items-center justify-between">
        <h3 id="modal-user-title" class="font-bold text-gray-800">เพิ่มผู้ใช้</h3>
        <button onclick="closeUserModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <div class="p-5 space-y-4">
        <input type="hidden" id="mu-id" />
        <div>
          <label class="block text-xs text-gray-500 mb-1">Username *</label>
          <input id="mu-username" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Password (เว้นว่าง = ไม่เปลี่ยน)</label>
          <input id="mu-password" type="password" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">สถานะ</label>
          <select id="mu-active" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            <option value="true">ใช้งานได้</option>
            <option value="false">ระงับ</option>
          </select>
        </div>
      </div>
      <div class="p-5 border-t flex gap-3 justify-end">
        <button onclick="closeUserModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600">ยกเลิก</button>
        <button onclick="saveUser()" class="px-5 py-2 bg-blue-700 text-white font-semibold rounded-lg text-sm">บันทึก</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('hordeeToken');
    if (!TOKEN) { window.location.replace('login.html'); throw new Error('not logged in'); }
    const H = { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

    const PLAN_LABELS = {
      FREE_TRIAL:   'Free Trial',
      STARTER:      'Starter S',
      STANDARD:     'Standard M',
      PROFESSIONAL: 'Professional L',
      ENTERPRISE:   'Enterprise',
    };
    const PLAN_COLORS = {
      FREE_TRIAL:   'bg-gray-100 text-gray-600',
      STARTER:      'bg-blue-100 text-blue-700',
      STANDARD:     'bg-indigo-100 text-indigo-700',
      PROFESSIONAL: 'bg-purple-100 text-purple-700',
      ENTERPRISE:   'bg-amber-100 text-amber-700',
    };

    let _props = [], _users = [];

    async function loadAll() {
      const [props, users, stats] = await Promise.all([
        fetch('/api/admin/properties', { headers: H }).then(r => r.json()),
        fetch('/api/admin/users',      { headers: H }).then(r => r.json()),
        fetch('/api/admin/stats',      { headers: H }).then(r => r.json()),
      ]);
      _props = props; _users = users;
      renderStats(stats);
      renderProperties();
      renderUsers();
    }

    function renderStats(s) {
      document.getElementById('stat-total').textContent  = s.totalProperties;
      document.getElementById('stat-active').textContent = s.activeProperties;
      document.getElementById('stat-rooms').textContent  = s.totalRooms;
      const stdPlus = (s.planBreakdown.STANDARD ?? 0) + (s.planBreakdown.PROFESSIONAL ?? 0) + (s.planBreakdown.ENTERPRISE ?? 0);
      document.getElementById('stat-std').textContent = stdPlus;
    }

    function renderProperties() {
      const tb = document.getElementById('property-table');
      if (!_props.length) {
        tb.innerHTML = '<tr><td colspan="7" class="px-4 py-6 text-center text-gray-400">ยังไม่มีหอพัก</td></tr>';
        return;
      }
      tb.innerHTML = _props.map(p => {
        const sub  = p.subscription;
        const plan = sub ? PLAN_LABELS[sub.plan] : '—';
        const color = sub ? PLAN_COLORS[sub.plan] : 'bg-gray-100 text-gray-400';
        const exp  = sub?.expiresAt ? new Date(sub.expiresAt).toLocaleDateString('th-TH') : 'ไม่กำหนด';
        const expired = sub?.expiresAt && new Date() > new Date(sub.expiresAt);
        const rooms = p._count?.rooms ?? '—';
        return `<tr class="hover:bg-gray-50">
          <td class="px-4 py-3 font-medium">${p.name}</td>
          <td class="px-4 py-3 text-gray-500">${p.ownerName ?? '—'}</td>
          <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${color}">${plan}</span></td>
          <td class="px-4 py-3 text-center">${rooms}</td>
          <td class="px-4 py-3 text-xs ${expired ? 'text-red-500 font-semibold' : 'text-gray-500'}">${exp}${expired ? ' (หมดแล้ว)' : ''}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-0.5 rounded-full text-xs font-semibold ${p.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">
              ${p.isActive ? 'ใช้งาน' : 'ระงับ'}
            </span>
          </td>
          <td class="px-4 py-3 flex gap-2">
            <button onclick="editProperty('${p.id}')" class="text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded text-gray-700 transition">แก้ไข</button>
            <button onclick="openSubModal('${p.id}')" class="text-xs px-2 py-1 bg-indigo-50 hover:bg-indigo-100 rounded text-indigo-700 transition">แพ็กเกจ</button>
            <button onclick="toggleProperty('${p.id}', ${!p.isActive})" class="text-xs px-2 py-1 ${p.isActive ? 'bg-red-50 hover:bg-red-100 text-red-600' : 'bg-green-50 hover:bg-green-100 text-green-700'} rounded transition">
              ${p.isActive ? 'ระงับ' : 'เปิด'}
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    function renderUsers() {
      const tb = document.getElementById('user-table');
      tb.innerHTML = _users.map(u => `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 font-medium">${u.username}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-0.5 rounded-full text-xs font-semibold ${u.role === 'MASTER_ADMIN' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}">
              ${u.role === 'MASTER_ADMIN' ? 'Master Admin' : 'Property Admin'}
            </span>
          </td>
          <td class="px-4 py-3 text-gray-500">${u.property?.name ?? '—'}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-0.5 rounded-full text-xs font-semibold ${u.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">
              ${u.isActive ? 'ใช้งาน' : 'ระงับ'}
            </span>
          </td>
          <td class="px-4 py-3">
            <button onclick="editUser('${u.id}')" class="text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded text-gray-700">แก้ไข</button>
          </td>
        </tr>`).join('');
    }

    // ─── Tab ─────────────────────────────────────────────────────────────────
    function showTab(tab) {
      ['properties','users'].forEach(t => {
        document.getElementById(`tab-${t}-content`).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById(`tab-${t}`);
        btn.className = `px-5 py-2 rounded-lg text-sm font-medium transition ${t === tab ? 'bg-blue-700 text-white' : 'text-gray-600 hover:bg-gray-100'}`;
      });
    }

    // ─── Property Modal ───────────────────────────────────────────────────────
    function openPropertyModal() {
      document.getElementById('mp-id').value       = '';
      document.getElementById('mp-name').value     = '';
      document.getElementById('mp-owner').value    = '';
      document.getElementById('mp-phone').value    = '';
      document.getElementById('mp-address').value  = '';
      document.getElementById('mp-plan').value     = 'FREE_TRIAL';
      document.getElementById('mp-expires').value  = '';
      document.getElementById('mp-username').value = '';
      document.getElementById('mp-password').value = '';
      document.getElementById('mp-line-token').value  = '';
      document.getElementById('mp-line-secret').value = '';
      document.getElementById('mp-new-user-section').classList.remove('hidden');
      document.getElementById('modal-property-title').textContent = 'เพิ่มหอพักใหม่';
      document.getElementById('modal-property').classList.remove('hidden');
    }

    function editProperty(id) {
      const p = _props.find(x => x.id === id);
      if (!p) return;
      document.getElementById('mp-id').value      = p.id;
      document.getElementById('mp-name').value    = p.name;
      document.getElementById('mp-owner').value   = p.ownerName ?? '';
      document.getElementById('mp-phone').value   = p.phone ?? '';
      document.getElementById('mp-address').value = p.address ?? '';
      document.getElementById('mp-plan').value    = p.subscription?.plan ?? 'FREE_TRIAL';
      document.getElementById('mp-expires').value = p.subscription?.expiresAt
        ? new Date(p.subscription.expiresAt).toISOString().slice(0, 10) : '';
      document.getElementById('mp-line-token').value  = p.lineChannelAccessToken ?? '';
      document.getElementById('mp-line-secret').value = p.lineChannelSecret ?? '';
      document.getElementById('mp-new-user-section').classList.add('hidden');
      document.getElementById('modal-property-title').textContent = `แก้ไข: ${p.name}`;
      document.getElementById('modal-property').classList.remove('hidden');
    }

    function closePropertyModal() {
      document.getElementById('modal-property').classList.add('hidden');
    }

    async function saveProperty() {
      const id = document.getElementById('mp-id').value;
      const body = {
        name:      document.getElementById('mp-name').value.trim(),
        ownerName: document.getElementById('mp-owner').value.trim() || null,
        phone:     document.getElementById('mp-phone').value.trim() || null,
        address:   document.getElementById('mp-address').value.trim() || null,
        plan:      document.getElementById('mp-plan').value,
        expiresAt: document.getElementById('mp-expires').value || null,
        lineChannelAccessToken: document.getElementById('mp-line-token').value.trim() || null,
        lineChannelSecret:      document.getElementById('mp-line-secret').value.trim() || null,
      };
      if (!id) {
        body.username = document.getElementById('mp-username').value.trim();
        body.password = document.getElementById('mp-password').value;
        if (!body.name || !body.username || !body.password) { alert('กรุณากรอก ชื่อหอ, Username, Password'); return; }
      }
      const url    = id ? `/api/admin/properties/${id}` : '/api/admin/properties';
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: H, body: JSON.stringify(body) });
      if (!res.ok) { const e = await res.json(); alert(e.error); return; }
      closePropertyModal();
      loadAll();
    }

    async function toggleProperty(id, isActive) {
      if (!confirm(`${isActive ? 'เปิด' : 'ระงับ'}การใช้งานหอพักนี้?`)) return;
      await fetch(`/api/admin/properties/${id}`, { method: 'PUT', headers: H, body: JSON.stringify({ isActive }) });
      loadAll();
    }

    // ─── Subscription Modal ───────────────────────────────────────────────────
    async function openSubModal(propertyId) {
      document.getElementById('sub-prop-id').value = propertyId;
      const sub = await fetch(`/api/admin/properties/${propertyId}/subscription`, { headers: H }).then(r => r.json());
      document.getElementById('sub-plan').value    = sub?.plan    ?? 'FREE_TRIAL';
      document.getElementById('sub-expires').value = sub?.expiresAt ? new Date(sub.expiresAt).toISOString().slice(0,10) : '';
      document.getElementById('sub-active').checked = sub?.isActive ?? true;
      document.getElementById('modal-sub').classList.remove('hidden');
    }

    function closeSubModal() {
      document.getElementById('modal-sub').classList.add('hidden');
    }

    async function saveSub() {
      const id = document.getElementById('sub-prop-id').value;
      const body = {
        plan:      document.getElementById('sub-plan').value,
        expiresAt: document.getElementById('sub-expires').value || null,
        isActive:  document.getElementById('sub-active').checked,
      };
      await fetch(`/api/admin/properties/${id}/subscription`, { method: 'PUT', headers: H, body: JSON.stringify(body) });
      closeSubModal();
      loadAll();
    }

    // ─── User Modal ───────────────────────────────────────────────────────────
    function openUserModal() {
      document.getElementById('mu-id').value       = '';
      document.getElementById('mu-username').value = '';
      document.getElementById('mu-password').value = '';
      document.getElementById('mu-active').value   = 'true';
      document.getElementById('modal-user-title').textContent = 'เพิ่มผู้ใช้';
      document.getElementById('modal-user').classList.remove('hidden');
    }

    function editUser(id) {
      const u = _users.find(x => x.id === id);
      if (!u) return;
      document.getElementById('mu-id').value       = u.id;
      document.getElementById('mu-username').value = u.username;
      document.getElementById('mu-password').value = '';
      document.getElementById('mu-active').value   = u.isActive ? 'true' : 'false';
      document.getElementById('modal-user-title').textContent = `แก้ไข: ${u.username}`;
      document.getElementById('modal-user').classList.remove('hidden');
    }

    function closeUserModal() {
      document.getElementById('modal-user').classList.add('hidden');
    }

    async function saveUser() {
      const id   = document.getElementById('mu-id').value;
      const body = {
        username: document.getElementById('mu-username').value.trim(),
        isActive: document.getElementById('mu-active').value === 'true',
      };
      const pw = document.getElementById('mu-password').value;
      if (pw) body.password = pw;
      const url    = id ? `/api/admin/users/${id}` : '/api/admin/users';
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: H, body: JSON.stringify(body) });
      if (!res.ok) { const e = await res.json(); alert(e.error); return; }
      closeUserModal();
      loadAll();
    }

    function logout() {
      localStorage.removeItem('hordeeToken');
      window.location.replace('login.html');
    }

    loadAll();
  </script>
</body>
</html>
