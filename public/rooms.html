<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หอดี — ห้องพัก</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-blue-800 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5 select-none no-underline">
        <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-sm shrink-0">
          <svg class="w-5 h-5 text-blue-800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M4.5 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5h-.75V3.75a.75.75 0 000-1.5h-15zM9 6a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm-.75 3.75A.75.75 0 019 9h1.5a.75.75 0 010 1.5H9a.75.75 0 01-.75-.75zM9 12a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm3.75-5.25A.75.75 0 0113.5 6H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM13.5 9a.75.75 0 000 1.5H15A.75.75 0 0015 9h-1.5zm-.75 3.75a.75.75 0 01.75-.75H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM9 19.5v-2.25a.75.75 0 01.75-.75h4.5a.75.75 0 01.75.75V19.5H9z" clip-rule="evenodd" /></svg>
        </div>
        <div class="leading-tight">
          <div id="nav-property-name" class="font-bold text-lg tracking-wide text-white leading-none">ระบบหอพัก</div>
          <div class="text-blue-300 text-[11px] font-normal mt-0.5">ระบบจัดการหอพัก</div>
        </div>
      </a>
      <div class="flex gap-4 text-sm font-medium">
        <a href="index.html"    class="hover:text-blue-200">Dashboard</a>
        <a href="rooms.html"    class="hover:text-blue-200 border-b-2 border-white">ห้องพัก</a>
        <a href="tenants.html"  class="hover:text-blue-200">ผู้เช่า</a>
        <a href="queue.html"    class="hover:text-blue-200">คิวรอเช่า</a>
        <a href="water.html"    class="hover:text-blue-200">น้ำดื่ม</a>
        <a href="billing.html"  class="hover:text-blue-200">ออกบิล</a>
        <a href="invoices.html" class="hover:text-blue-200">ใบแจ้งหนี้</a>
        <a href="settings.html" class="hover:text-blue-200">ตั้งค่า</a>
      <button onclick="logout()" class="hover:text-red-300 text-xs opacity-70 hover:opacity-100 transition">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold text-gray-800">ห้องพักทั้งหมด</h1>
      <button onclick="openModal()" class="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-800 transition">+ เพิ่มห้อง</button>
    </div>

    <div id="room-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-12 text-gray-400">กำลังโหลด...</div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4">
      <h2 class="text-lg font-bold text-gray-800">เพิ่ม / แก้ไขห้องพัก</h2>
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="block text-sm text-gray-600 mb-1">เลขห้อง *</label>
          <input id="m-room"  type="text"   placeholder="101" class="inp" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">ชั้น</label>
          <input id="m-floor" type="number" placeholder="1"   class="inp" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">ค่าเช่า/เดือน (฿) *</label>
          <input id="m-rent"  type="number" placeholder="3500" class="inp" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">ราคาไฟ/หน่วย (ว่าง=default)</label>
          <input id="m-erate" type="number" placeholder="8"   class="inp" />
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">ราคาน้ำ/หน่วย (ว่าง=default)</label>
          <input id="m-wrate" type="number" placeholder="18"  class="inp" />
        </div>
        <div class="col-span-2">
          <label class="block text-sm text-gray-600 mb-1">หมายเหตุ</label>
          <input id="m-desc"  type="text"   placeholder="เช่น ห้องมุม ชั้น 1" class="inp" />
        </div>
      </div>
      <input type="hidden" id="m-id" />
      <div class="flex gap-2 pt-2">
        <button onclick="saveRoom()" class="flex-1 bg-blue-700 text-white py-2 rounded-lg hover:bg-blue-800 transition text-sm font-medium">บันทึก</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition text-sm">ยกเลิก</button>
      </div>
    </div>
  </div>

  <style>
    .inp { width: 100%; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; }
    .inp:focus { ring: 2px; border-color: #3b82f6; }
  </style>

  <script>
    const TOKEN = localStorage.getItem('hordeeToken');
    if (!TOKEN) { window.location.replace('login.html'); throw new Error('not logged in'); }
    const headers = { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

    async function load() {
      const rooms = await fetch('/api/rooms', { headers }).then(r => r.json());
      const grid  = document.getElementById('room-grid');
      if (!rooms.length) { grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">ยังไม่มีห้องพัก</div>'; return; }
      grid.innerHTML = rooms.map(r => {
        const contract = r.contracts?.[0];
        const occupied = !!contract;
        const tenant   = contract?.tenant?.name ?? 'ว่าง';
        return `
          <div class="bg-white rounded-xl shadow p-4 border-l-4 ${occupied ? 'border-blue-500' : 'border-gray-200'}">
            <div class="flex items-start justify-between">
              <div>
                <p class="text-2xl font-bold text-blue-700">${r.roomNumber}</p>
                <p class="text-xs text-gray-400">ชั้น ${r.floor ?? '—'}</p>
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full ${occupied ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}">${occupied ? 'มีผู้เช่า' : 'ว่าง'}</span>
            </div>
            <p class="mt-2 text-sm font-medium text-gray-700">${tenant}</p>
            <p class="text-xs text-gray-400">฿${Number(r.monthlyRent).toLocaleString('th-TH')}/เดือน</p>
            <div class="mt-3 flex gap-1.5">
              <button onclick='openModal(${JSON.stringify(r)})' class="flex-1 text-xs border border-gray-200 rounded-lg py-1.5 hover:bg-gray-50 transition text-gray-600">แก้ไข</button>
              <button onclick='deleteRoom("${r.id}","${r.roomNumber}")' class="text-xs border border-red-200 text-red-500 rounded-lg px-2.5 py-1.5 hover:bg-red-50 transition" title="ลบห้อง">ลบ</button>
            </div>
          </div>`;
      }).join('');
    }

    function openModal(room) {
      document.getElementById('m-id').value    = room?.id    ?? '';
      document.getElementById('m-room').value  = room?.roomNumber ?? '';
      document.getElementById('m-floor').value = room?.floor ?? '';
      document.getElementById('m-rent').value  = room?.monthlyRent ?? '';
      document.getElementById('m-erate').value = room?.customElectricRate ?? '';
      document.getElementById('m-wrate').value = room?.customWaterRate    ?? '';
      document.getElementById('m-desc').value  = room?.description ?? '';
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function saveRoom() {
      const id   = document.getElementById('m-id').value;
      const body = {
        roomNumber:         document.getElementById('m-room').value,
        floor:              document.getElementById('m-floor').value  || null,
        monthlyRent:        document.getElementById('m-rent').value,
        customElectricRate: document.getElementById('m-erate').value  || null,
        customWaterRate:    document.getElementById('m-wrate').value  || null,
        description:        document.getElementById('m-desc').value   || null,
      };
      const url    = id ? `/api/rooms/${id}` : '/api/rooms';
      const method = id ? 'PUT' : 'POST';
      const r = await fetch(url, { method, headers, body: JSON.stringify(body) });
      if (r.ok) { closeModal(); load(); } else alert('❌ บันทึกไม่สำเร็จ');
    }

    async function deleteRoom(id, roomNumber) {
      if (!confirm(`ลบห้อง "${roomNumber}" ออกจากระบบ?\n\n(ลบได้เฉพาะห้องที่ไม่มีผู้เช่าอยู่เท่านั้น)`)) return;
      const r = await fetch(`/api/rooms/${id}`, { method: 'DELETE', headers });
      if (r.ok) { load(); }
      else { const d = await r.json(); alert('❌ ' + (d.error || 'ลบไม่สำเร็จ')); }
    }

    // Load property name in navbar
    (async () => {
      const t = localStorage.getItem('hordeeToken');
      if (!t) return;
      try {
        const r = await fetch('/api/settings', { headers: { Authorization: 'Bearer ' + t } });
        if (r.ok) {
          const s = await r.json();
          if (s.dormName) {
            const el = document.getElementById('nav-property-name');
            if (el) el.textContent = s.dormName;
          }
        }
      } catch {}
    })();

    load();
  </script>

  <script>
    function logout() {
      localStorage.removeItem('hordeeToken');
      window.location.replace('login.html');
    }
  </script>
</body>
</html>
