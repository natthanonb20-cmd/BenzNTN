<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMSPRO — แจ้งซ่อม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-blue-800 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5 select-none no-underline">
        <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-sm shrink-0">
          <svg class="w-5 h-5 text-blue-800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M4.5 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5h-.75V3.75a.75.75 0 000-1.5h-15zM9 6a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm-.75 3.75A.75.75 0 019 9h1.5a.75.75 0 010 1.5H9a.75.75 0 01-.75-.75zM9 12a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm3.75-5.25A.75.75 0 0113.5 6H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM13.5 9a.75.75 0 000 1.5H15A.75.75 0 0015 9h-1.5zm-.75 3.75a.75.75 0 01.75-.75H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM9 19.5v-2.25a.75.75 0 01.75-.75h4.5a.75.75 0 01.75.75V19.5H9z" clip-rule="evenodd" /></svg>
        </div>
        <div class="leading-tight">
          <div id="nav-property-name" class="font-bold text-lg tracking-wide text-white leading-none">ระบบหอพัก</div>
          <div class="text-blue-300 text-[11px] font-normal mt-0.5">ระบบจัดการหอพัก</div>
        </div>
      </a>
      <div class="flex gap-4 text-sm font-medium">
        <a href="index.html"    class="hover:text-blue-200">Dashboard</a>
        <a href="rooms.html"    class="hover:text-blue-200">ห้องพัก</a>
        <a href="tenants.html"  class="hover:text-blue-200">ผู้เช่า</a>
        <a href="queue.html"    class="hover:text-blue-200">คิวรอเช่า</a>
        <a href="water.html"    class="hover:text-blue-200">น้ำดื่ม</a>
        <a href="billing.html"  class="hover:text-blue-200">ออกบิล</a>
        <a href="invoices.html" class="hover:text-blue-200">ใบแจ้งหนี้</a>
        <a href="repairs.html"  class="hover:text-blue-200 border-b-2 border-white pb-0.5">🔧 แจ้งซ่อม</a>
        <a href="settings.html" class="hover:text-blue-200">ตั้งค่า</a>
        <button onclick="logout()" class="hover:text-red-300 text-xs opacity-70 hover:opacity-100 transition">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-5">
      <h1 class="text-2xl font-bold text-gray-800">🔧 รายการแจ้งซ่อม</h1>
      <div class="flex gap-2">
        <select id="filter-status" onchange="load()" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm">
          <option value="">ทุกสถานะ</option>
          <option value="OPEN">รอดำเนินการ</option>
          <option value="IN_PROGRESS">กำลังซ่อม</option>
          <option value="DONE">เสร็จแล้ว</option>
          <option value="REJECTED">ปฏิเสธ</option>
        </select>
        <select id="filter-priority" onchange="load()" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm">
          <option value="">ทุกความสำคัญ</option>
          <option value="HIGH">ด่วน</option>
          <option value="NORMAL">ปกติ</option>
          <option value="LOW">ไม่ด่วน</option>
        </select>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="stats-bar"></div>

    <!-- List -->
    <div id="repair-list" class="space-y-3"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex items-start justify-between">
        <h2 id="modal-title" class="text-lg font-bold text-gray-800"></h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="space-y-3 text-sm text-gray-600"></div>
      <div id="modal-actions" class="space-y-2 pt-2"></div>
    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('hordeeToken');
    if (!TOKEN) { window.location.replace('login.html'); throw 0; }
    const headers = { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

    const STATUS_LABEL = { OPEN: 'รอดำเนินการ', IN_PROGRESS: 'กำลังซ่อม', DONE: 'เสร็จแล้ว', REJECTED: 'ปฏิเสธ' };
    const STATUS_COLOR = { OPEN: 'bg-yellow-100 text-yellow-800', IN_PROGRESS: 'bg-blue-100 text-blue-800', DONE: 'bg-green-100 text-green-700', REJECTED: 'bg-red-100 text-red-700' };
    const PRI_LABEL    = { HIGH: '🔴 ด่วน', NORMAL: '🟡 ปกติ', LOW: '⚪ ไม่ด่วน' };

    let _items = [];
    let _current = null;

    async function load() {
      const status   = document.getElementById('filter-status').value;
      const priority = document.getElementById('filter-priority').value;
      const params   = new URLSearchParams();
      if (status)   params.set('status', status);
      if (priority) params.set('priority', priority);

      const r = await fetch(`/api/repairs?${params}`, { headers });
      _items = r.ok ? await r.json() : [];
      renderStats();
      renderList();
    }

    function renderStats() {
      const all = _items;
      const counts = { OPEN: 0, IN_PROGRESS: 0, DONE: 0, REJECTED: 0 };
      all.forEach(i => counts[i.status] = (counts[i.status] || 0) + 1);
      document.getElementById('stats-bar').innerHTML = [
        { label: 'รอดำเนินการ', val: counts.OPEN,        color: 'text-yellow-600 bg-yellow-50 border-yellow-200' },
        { label: 'กำลังซ่อม',   val: counts.IN_PROGRESS, color: 'text-blue-600 bg-blue-50 border-blue-200' },
        { label: 'เสร็จแล้ว',   val: counts.DONE,        color: 'text-green-600 bg-green-50 border-green-200' },
        { label: 'ปฏิเสธ',      val: counts.REJECTED,    color: 'text-red-500 bg-red-50 border-red-200' },
      ].map(s => `
        <div class="border rounded-xl px-4 py-3 ${s.color}">
          <div class="text-2xl font-bold">${s.val}</div>
          <div class="text-xs font-medium mt-0.5">${s.label}</div>
        </div>`).join('');
    }

    function renderList() {
      const el = document.getElementById('repair-list');
      if (!_items.length) {
        el.innerHTML = '<div class="text-center text-gray-400 py-12">ไม่มีรายการแจ้งซ่อม</div>';
        return;
      }
      el.innerHTML = _items.map(item => `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 cursor-pointer hover:shadow-md transition"
             onclick="openModal('${item.id}')">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-gray-800">${item.title}</span>
                <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${STATUS_COLOR[item.status]}">${STATUS_LABEL[item.status]}</span>
              </div>
              <div class="text-sm text-gray-500 mt-1">
                ${item.tenant?.name ?? '—'} · ${PRI_LABEL[item.priority]}
              </div>
              ${item.description ? `<div class="text-sm text-gray-400 mt-1 truncate">${item.description}</div>` : ''}
            </div>
            <div class="text-xs text-gray-400 shrink-0">${new Date(item.createdAt).toLocaleDateString('th-TH', { day:'numeric', month:'short' })}</div>
          </div>
          ${item.imagePath ? `<img src="${item.imagePath}" class="mt-3 rounded-lg h-28 object-cover w-full" />` : ''}
        </div>`).join('');
    }

    function openModal(id) {
      _current = _items.find(i => i.id === id);
      if (!_current) return;
      const item = _current;
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-body').innerHTML = `
        <div class="grid grid-cols-2 gap-2">
          <div><span class="text-gray-400">ผู้แจ้ง:</span> <span class="font-medium text-gray-800">${item.tenant?.name ?? '—'}</span></div>
          <div><span class="text-gray-400">ความสำคัญ:</span> <span class="font-medium">${PRI_LABEL[item.priority]}</span></div>
          <div><span class="text-gray-400">สถานะ:</span> <span class="font-semibold px-2 py-0.5 rounded-full text-xs ${STATUS_COLOR[item.status]}">${STATUS_LABEL[item.status]}</span></div>
          <div><span class="text-gray-400">วันที่แจ้ง:</span> ${new Date(item.createdAt).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' })}</div>
        </div>
        ${item.description ? `<div class="bg-gray-50 rounded-lg p-3 mt-2">${item.description}</div>` : ''}
        ${item.imagePath ? `<img src="${item.imagePath}" class="rounded-xl w-full object-cover max-h-52 mt-2" />` : ''}
        <div class="mt-3">
          <label class="text-xs font-semibold text-gray-500 mb-1 block">หมายเหตุสำหรับเจ้าของ</label>
          <textarea id="modal-admin-note" rows="2" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">${item.adminNote ?? ''}</textarea>
        </div>`;

      document.getElementById('modal-actions').innerHTML = `
        <div class="grid grid-cols-2 gap-2">
          ${item.status === 'OPEN' ? `<button onclick="updateItem('IN_PROGRESS')" class="py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700">⚙️ เริ่มดำเนินการ</button>` : ''}
          ${item.status === 'IN_PROGRESS' ? `<button onclick="updateItem('DONE')" class="py-2 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700">✅ เสร็จแล้ว</button>` : ''}
          ${(item.status === 'OPEN' || item.status === 'IN_PROGRESS') ? `<button onclick="updateItem('REJECTED')" class="py-2 bg-red-100 text-red-600 rounded-xl text-sm font-semibold hover:bg-red-200">❌ ปฏิเสธ</button>` : ''}
          <button onclick="deleteItem('${item.id}')" class="py-2 bg-gray-100 text-gray-500 rounded-xl text-sm hover:bg-gray-200 ${item.status === 'OPEN' || item.status === 'IN_PROGRESS' ? '' : 'col-span-2'}">ลบ</button>
        </div>`;

      document.getElementById('detail-modal').classList.remove('hidden');
    }

    async function updateItem(status) {
      if (!_current) return;
      const adminNote = document.getElementById('modal-admin-note')?.value ?? '';
      const r = await fetch(`/api/repairs/${_current.id}`, {
        method: 'PUT', headers,
        body: JSON.stringify({ status, adminNote }),
      });
      if (r.ok) { closeModal(); load(); }
      else alert('❌ อัปเดตไม่สำเร็จ');
    }

    async function deleteItem(id) {
      if (!confirm('ลบรายการนี้?')) return;
      const r = await fetch(`/api/repairs/${id}`, { method: 'DELETE', headers });
      if (r.ok) { closeModal(); load(); }
      else alert('❌ ลบไม่สำเร็จ');
    }

    function closeModal() {
      document.getElementById('detail-modal').classList.add('hidden');
      _current = null;
    }

    // Property name in navbar
    (async () => {
      try {
        const s = await fetch('/api/settings', { headers }).then(r => r.json());
        if (s.dormName) document.getElementById('nav-property-name').textContent = s.dormName;
      } catch {}
    })();

    function logout() { localStorage.removeItem('hordeeToken'); window.location.replace('login.html'); }

    load();
  </script>
</body>
</html>
