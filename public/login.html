<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMSPRO — เข้าสู่ระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center mb-4">
        <div class="w-16 h-16 bg-blue-800 rounded-2xl flex items-center justify-center shadow-lg">
          <svg class="w-10 h-10 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M4.5 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5h-.75V3.75a.75.75 0 000-1.5h-15zM9 6a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm-.75 3.75A.75.75 0 019 9h1.5a.75.75 0 010 1.5H9a.75.75 0 01-.75-.75zM9 12a.75.75 0 000 1.5h1.5a.75.75 0 000-1.5H9zm3.75-5.25A.75.75 0 0113.5 6H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM13.5 9a.75.75 0 000 1.5H15A.75.75 0 0015 9h-1.5zm-.75 3.75a.75.75 0 01.75-.75H15a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zM9 19.5v-2.25a.75.75 0 01.75-.75h4.5a.75.75 0 01.75.75V19.5H9z" clip-rule="evenodd" /></svg>
        </div>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">ระบบจัดการหอพัก</h1>
      <p class="text-sm text-gray-400 mt-1">ระบบบริหารจัดการหอพัก</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">ชื่อผู้ใช้</label>
        <input id="inp-username" type="text" placeholder="Username" autocomplete="username"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">รหัสผ่าน</label>
        <div class="relative">
          <input id="inp-password" type="password" placeholder="••••••••" autocomplete="current-password"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition pr-12" />
          <button type="button" id="btn-toggle" onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">
            👁
          </button>
        </div>
      </div>

      <p id="error-msg" class="hidden text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
        ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
      </p>

      <button type="submit" id="btn-login"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition text-sm mt-2">
        เข้าสู่ระบบ
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
      ยังไม่มีบัญชี?
      <a href="register.html" class="text-blue-600 hover:underline font-medium">สมัครใช้งานฟรี</a>
    </p>
  </div>

  <script>
    // Already logged in → redirect based on role
    if (localStorage.getItem('hordeeToken')) {
      (async () => {
        try {
          const me = await fetch('/api/auth/me', {
            headers: { Authorization: 'Bearer ' + localStorage.getItem('hordeeToken') }
          }).then(r => r.json());
          window.location.replace('index.html');
        } catch {
          window.location.replace('index.html');
        }
      })();
    }

    function togglePassword() {
      const inp = document.getElementById('inp-password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('inp-username').value.trim();
      const password = document.getElementById('inp-password').value;
      const errMsg   = document.getElementById('error-msg');
      const btn      = document.getElementById('btn-login');

      if (!username || !password) return;

      errMsg.classList.add('hidden');
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      btn.disabled    = true;

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('hordeeToken', data.token);
          window.location.replace('index.html');
        } else if (data.code === 'PENDING_APPROVAL') {
          errMsg.className = 'text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2';
          errMsg.innerHTML = '⏳ บัญชีของคุณยังรออนุมัติจากผู้ดูแลระบบ<br><span class="text-xs">กรุณาติดต่อผู้ดูแลระบบหากรอนานเกิน 24 ชั่วโมง</span>';
          errMsg.classList.remove('hidden');
        } else {
          errMsg.className = 'text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2';
          errMsg.textContent = data.error || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
          errMsg.classList.remove('hidden');
        }
      } catch {
        errMsg.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errMsg.classList.remove('hidden');
      } finally {
        btn.textContent = 'เข้าสู่ระบบ';
        btn.disabled    = false;
      }
    });

    // Focus username on load
    document.getElementById('inp-username').focus();
  </script>
</body>
</html>
